# AI Engines Registry
# Version: 1.1.0 — Updated: 2026-06-28

engines:
  claude_code:
    id: claude-code
    name: "Claude Code (Anthropic)"
    status: pending_key
    secret_key: ANTHROPIC_API_KEY
    trigger_event: claude-task
    capabilities: [code_generation, code_review, refactoring, testing, documentation]

  zai:
    id: zai
    name: "Z.ai"
    status: active
    secret_key: ZAI_API_KEY
    trigger_event: zai-task
    capabilities: [code_generation, ui_design, full_stack_development, autonomous_coding]

  codex:
    id: codex
    name: "OpenAI Codex"
    status: pending_key
    secret_key: OPENAI_API_KEY
    trigger_event: codex-task
    capabilities: [code_completion, code_generation, refactoring]

gateway:
  primary: zai
  fallback: claude-code
  all_changes_via_ai: true
  human_coding: false
  sentinel_required: true
  active_engines: [zai]
  pending_engines: [claude-code, codex]
