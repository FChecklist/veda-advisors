# AI Engines Registry
# Defines all AI engines that can connect to and operate on this repository
# Version: 1.0.0

engines:
  claude_code:
    id: claude-code
    name: "Claude Code (Anthropic)"
    status: active
    secret_key: ANTHROPIC_API_KEY
    trigger_event: claude-task
    capabilities:
      - code_generation
      - code_review
      - refactoring
      - testing
      - documentation
    dispatch_url: "https://api.github.com/repos/FChecklist/{repo}/dispatches"
    auth_header: "Authorization: Bearer {PAT_FCHECKLIST}"
    body: |
      {"event_type": "claude-task", "client_payload": {"task": "{task}", "branch": "{branch}"}}

  zai:
    id: zai
    name: "Z.ai"
    status: pending_key
    secret_key: ZAI_API_KEY
    trigger_event: zai-task
    capabilities:
      - code_generation
      - ui_design
      - full_stack_development
    dispatch_url: "https://api.github.com/repos/FChecklist/{repo}/dispatches"
    note: "Requires ZAI_API_KEY to be added to GitHub Secrets"

  codex:
    id: codex
    name: "OpenAI Codex"
    status: pending_key
    secret_key: OPENAI_API_KEY
    trigger_event: codex-task
    capabilities:
      - code_completion
      - code_generation
      - refactoring
    dispatch_url: "https://api.github.com/repos/FChecklist/{repo}/dispatches"
    note: "Requires OPENAI_API_KEY to be added to GitHub Secrets"

gateway:
  primary: claude-code
  fallback: zai
  all_changes_via_ai: true
  human_coding: false
  dispatch_pattern: repository_dispatch
  sentinel_required: true
