# Module Spec Template
# Copy to ai-os/specs/modules/SPEC-[MODULE-ID].yaml for each module/feature.
# Every field is required. AI agents cannot implement without a complete spec.

metadata:
  id: "SPEC-XXX"
  name: "Module or Feature Name"
  version: "1.0.0"
  module: "MOD-XXX"
  project: "compliance-tracker | meettrack | veda-advisors"
  boss: "VEDABOSS | MEETINGBOSS | VEDAADVISORBOSS"
  status: "pending"
  priority: "critical | high | medium | low"
  created_by: "Sentinel"
  created_at: "YYYY-MM-DDTHH:MM:SSZ"
  last_updated: "YYYY-MM-DDTHH:MM:SSZ"
  last_updated_by: "AGENT-ID"
  assigned_to: null
  estimated_hours: 0

lifecycle_stage:
  current: "UNDERSTAND"
  understand: { status: pending, completed_at: null, notes: "" }
  research: { status: pending, completed_at: null, notes: "" }
  design: { status: pending, completed_at: null, notes: "" }
  validate: { status: pending, completed_at: null, notes: "" }
  implement: { status: pending, completed_at: null, notes: "" }
  test: { status: pending, completed_at: null, notes: "" }
  review: { status: pending, completed_at: null, notes: "" }
  deploy: { status: pending, completed_at: null, notes: "" }
  monitor: { status: pending, completed_at: null, notes: "" }
  learn: { status: pending, completed_at: null, notes: "" }
  improve: { status: pending, completed_at: null, notes: "" }

business:
  objective: |
    What business problem does this solve? Who benefits and how?
    Be specific about the measurable outcome.
  context: |
    Why is this needed now? What is the current state without this?
  stakeholders:
    - { role: "User", concern: "What they care about" }
  business_rules:
    - { id: "BR-001", rule: "Describe the business rule", source: "Where this rule came from" }

requirements:
  functional:
    - { id: "FR-001", description: "The system shall...", priority: high, acceptance_criterion: "AC-001" }
  technical:
    - { id: "TR-001", description: "Technical requirement", rationale: "Why" }
  non_functional:
    - { id: "NFR-001", category: "performance", description: "Requirement", measurement: "How measured", target: "Target" }

constraints:
  technical: []
  business: []
  dependencies: []

security:
  classification: "internal"
  data_sensitivity: "low"
  requirements:
    - { id: "SR-001", description: "Authentication required on all endpoints" }
    - { id: "SR-002", description: "Authorization: only authorized roles can access" }
    - { id: "SR-003", description: "Input validation on all user-supplied data" }
  fraud_scenarios:
    - id: "FS-001"
      scenario: "User attempts to access another users data by manipulating IDs"
      mitigation: "Server-side authorization check on every request"
      test_required: true
      test_id: "TEST-FS-001"
  attack_vectors:
    - { vector: "SQL Injection", mitigation: "Use parameterized queries via ORM" }
    - { vector: "XSS", mitigation: "Sanitize all user input CSP headers" }
    - { vector: "CSRF", mitigation: "CSRF tokens on state-mutating requests" }

edge_cases:
  - { id: "EC-001", scenario: "User submits empty form", expected_behaviour: "Validation error shown", test_required: true }
  - { id: "EC-002", scenario: "Network timeout during operation", expected_behaviour: "Error shown operation can be retried", test_required: true }
  - { id: "EC-003", scenario: "Concurrent modification by two users", expected_behaviour: "Handled gracefully", test_required: true }

acceptance_criteria:
  - id: "AC-001"
    requirement: "FR-001"
    given: "Given the user is authenticated"
    when: "When they perform action X"
    then: "Then the system does Y"
    test_ids: ["TEST-001"]

tests:
  unit:
    - { id: "TEST-UNIT-001", name: "Test business logic", file: "tests/unit/module.test.ts", covers: ["FR-001"], status: pending }
  integration:
    - { id: "TEST-INT-001", name: "Test API endpoint", file: "tests/integration/api.test.ts", covers: ["FR-001"], status: pending }
  e2e:
    - { id: "TEST-E2E-001", name: "User can complete full flow", file: "tests/e2e/flow.spec.ts", covers: ["AC-001"], status: pending }
  security:
    - { id: "TEST-SEC-001", name: "Test FS-001 fraud scenario", file: "tests/security/auth.test.ts", covers: ["FS-001"], status: pending }
  performance:
    - { id: "TEST-PERF-001", name: "API response under load", tool: "k6", covers: ["NFR-001"], status: pending }

ai_review_checklist:
  before_implementation:
    - "Spec is complete and all fields are filled"
    - "All dependencies in constraints are completed"
    - "No conflicting spec exists in ai-os/specs/modules/"
    - "All referenced APIs exist in ai-os/registry/ARTIFACTS.yaml"
    - "All referenced DB tables exist in ai-os/registry/ARTIFACTS.yaml"
  during_implementation:
    - "Business logic is in service layer not UI"
    - "No hardcoded credentials"
    - "All new functions have TypeScript types"
    - "Error handling at every async boundary"
    - "Logging is safe - no sensitive data"
  after_implementation:
    - "All acceptance criteria have passing tests"
    - "All fraud scenarios have passing tests"
    - "All edge cases have passing tests"
    - "Coverage >= 90%"
    - "No lint errors"
    - "No TypeScript errors"
    - "CHANGELOG.md updated"
    - "Registry ARTIFACTS.yaml updated for new artifacts"

sentinel_validation_rules:
  - { rule_id: "SE-001", check: "No secrets in code" }
  - { rule_id: "AR-001", check: "No DB access from UI layer" }
  - { rule_id: "TE-001", check: "Coverage >= 90%" }
  - { rule_id: "TE-002", check: "All acceptance criteria tested" }
  - { rule_id: "TE-003", check: "All fraud scenarios tested" }

success_metrics:
  - { metric: "Feature adoption rate", target: ">50% of active users within 30 days", measurement: "PostHog funnel" }
  - { metric: "Error rate post-deployment", target: "<0.1% of requests", measurement: "Sentry error rate" }
  - { metric: "Performance", target: "p95 response time < 200ms", measurement: "Vercel analytics" }

rollback_strategy:
  triggers:
    - "Error rate increases >10% vs baseline"
    - "Key user journey broken"
    - "Data corruption detected"
    - "Security vulnerability discovered"
  steps:
    - "1. Alert BOSS and human operator"
    - "2. Revert deployment to previous version"
    - "3. If DB migration was run execute rollback migration"
    - "4. Verify system restored to previous state"
    - "5. Log incident in COMPLETED.yaml and sentinel/VIOLATIONS.yaml"
    - "6. Post-mortem: update spec with root cause and prevention"
  estimated_rollback_time: "< 5 minutes"
  data_rollback_possible: true

artifacts:
  apis: []
  database_tables: []
  ui_screens: []
  ui_components: []
  agents: []
  dependencies: []

change_log:
  - { date: "YYYY-MM-DD", author: "AGENT-ID", change: "Description", reason: "Why" }
