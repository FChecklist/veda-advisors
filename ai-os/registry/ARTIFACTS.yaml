  - id: MOD-INDIA
    spec: ai-os/specs/modules/SPEC-MOD-INDIA.yaml
    status: IMPLEMENTED
    related_to: [MOD-STAGE0, MOD-COMPONENTS]
  - id: MOD-STAGE0
    spec: ai-os/specs/modules/SPEC-MOD-STAGE0.yaml
    status: IMPLEMENTED
