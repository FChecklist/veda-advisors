# AI Operating System Manifest
# Machine-readable. Every AI agent reads this first before any action.
# Version: 1.0.0 | Bootstrapped: 2026-06-26

system:
  name: "FChecklist AI Operating System"
  version: "1.0.0"
  type: "ai-native-development-os"
  bootstrapped_at: "2026-06-26T00:00:00Z"
  maintained_by: "Sentinel"

prime_directive: |
  Every AI agent operating in this repository MUST:
  1. Read this file and ai-os/boss/BOSS.yaml before starting any work
  2. Register in ai-os/boss/ROSTER.yaml before executing any task
  3. Follow the lifecycle in ai-os/LIFECYCLE.yaml exactly
  4. Update ai-os/boss/BOARD.yaml on every status change
  5. Log completed work to ai-os/boss/COMPLETED.yaml
  6. Never duplicate work - check BOARD.yaml first
  7. Never invent APIs, tables, or packages not in ai-os/registry/ARTIFACTS.yaml
  8. Report all violations to ai-os/sentinel/VIOLATIONS.yaml

hierarchy:
  level_1_guardian: "SENTINEL"
  level_2_boss: "PROJECT_BOSS"
  level_3_agents: "AI_AGENTS"
  rule: "No agent acts without BOSS allocation. SENTINEL overrides everything."

projects:
  compliance_tracker:
    boss: "VEDABOSS"
    repo: "FChecklist/compliance-tracker"
  meettrack:
    boss: "MEETINGBOSS"
    repo: "FChecklist/meettrack-v2"
  veda_advisors:
    boss: "VEDAADVISORBOSS"
    repo: "FChecklist/veda-advisors"

coordination:
  deduplication_rule: "If task exists in BOARD.yaml with any status, do not create duplicate"
  conflict_resolution: "BOSS arbitrates. Sentinel enforces."

directories:
  ai_os_root: "ai-os/"
  boss_files: "ai-os/boss/"
  sentinel_files: "ai-os/sentinel/"
  registry: "ai-os/registry/"
  specs: "ai-os/specs/"
  schemas: "ai-os/schemas/"
  module_specs: "ai-os/specs/modules/"

machine_readable_artifacts:
  - { type: module, registry: "ai-os/registry/ARTIFACTS.yaml", schema: "ai-os/schemas/artifact.schema.json" }
  - { type: api, registry: "ai-os/registry/ARTIFACTS.yaml" }
  - { type: database_table, registry: "ai-os/registry/ARTIFACTS.yaml" }
  - { type: agent, registry: "ai-os/boss/BOSS.yaml", schema: "ai-os/schemas/agent.schema.json" }
  - { type: test, registry: "ai-os/registry/ARTIFACTS.yaml" }
  - { type: spec, location: "ai-os/specs/modules/", schema: "ai-os/schemas/spec.schema.json" }

knowledge_graph_query_rules:
  - "Before implementing an API: query ai-os/registry/ARTIFACTS.yaml apis[]"
  - "Before creating a DB table: query ai-os/registry/ARTIFACTS.yaml database_tables[]"
  - "Before creating a component: query ai-os/registry/ARTIFACTS.yaml ui_components[]"
  - "Before writing a test: query ai-os/registry/ARTIFACTS.yaml tests[]"
  - "Impact analysis: find artifact, read related_to[] for all affected artifacts"
