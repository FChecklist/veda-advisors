# Agent Lifecycle Definition
# Every AI agent follows this lifecycle for EVERY task. No exceptions.
# Version: 1.0.0 | Tracked in: ai-os/boss/BOARD.yaml

lifecycle:
  name: "AI Agent Development Lifecycle"
  version: "1.0.0"
  enforced_by: "SENTINEL"
  tracked_in: "ai-os/boss/BOARD.yaml"
  stages_must_run_in_order: true
  max_retries_per_stage: 3
  on_exceed_retries: "Halt. Set BOARD.yaml status=BLOCKED. Report to BOSS immediately."

stages:
  UNDERSTAND:
    order: 1
    required_reads:
      - "ai-os/OS.yaml"
      - "ai-os/boss/BOSS.yaml"
      - "ai-os/boss/BOARD.yaml (check for duplicates)"
      - "ai-os/registry/ARTIFACTS.yaml (understand existing state)"
      - "ai-os/specs/modules/SPEC-[MODULE].yaml (read the full spec)"
      - "SENTINEL.md"
    required_outputs:
      - "Confirm task not already in progress or completed"
      - "Confirm all referenced artifacts exist in registry"
      - "Identify spec conflicts or gaps"
      - "Update BOARD.yaml stage=UNDERSTAND status=in_progress"
    halt_if:
      - "Spec missing or incomplete"
      - "Task duplicate found in BOARD.yaml"
      - "Conflicting requirements found"

  RESEARCH:
    order: 2
    required_reads:
      - "ai-os/registry/ARTIFACTS.yaml (all sections)"
      - "All artifact files linked from the module spec"
    required_outputs:
      - "Impact map: list all artifacts affected by this change"
      - "Dependency list: what must exist before this can be built"
      - "Gap list: what is missing from the registry"
      - "Update BOARD.yaml stage=RESEARCH"
    halt_if:
      - "Critical dependency missing and not buildable"
      - "Change impacts more than 5 modules (needs architectural review)"

  DESIGN:
    order: 3
    required_outputs:
      - "Solution design documented in BOARD.yaml task notes"
      - "List of files to be created/modified"
      - "API contracts defined if applicable"
      - "Database changes described if applicable"
      - "Test strategy documented"
      - "Update BOARD.yaml stage=DESIGN"
    halt_if:
      - "Design requires breaking existing public API without BOSS and SENTINEL approval"
      - "Design requires schema migration in production without human approval"

  VALIDATE:
    order: 4
    checklist:
      - "Design matches all functional requirements in spec"
      - "Design satisfies all acceptance criteria"
      - "Security requirements addressed"
      - "Fraud scenarios handled"
      - "Edge cases covered"
      - "No architecture violations"
      - "No hardcoded secrets"
      - "No business logic in UI layer"
      - "No direct DB access from presentation layer"
    required_outputs:
      - "Validation result PASS or FAIL with reasons"
      - "Update BOARD.yaml stage=VALIDATE"
    halt_if:
      - "Validation FAIL - return to DESIGN"
      - "Security issue found - halt and report to SENTINEL immediately"

  IMPLEMENT:
    order: 5
    rules:
      - "Only reference APIs and tables verified in RESEARCH stage"
      - "Every new file must be registered in ai-os/registry/ARTIFACTS.yaml"
      - "Commit format: [AGENT-ID] [TASK-ID] brief description"
      - "Feature branch only - no direct commits to main or master"
    required_outputs:
      - "All code files created"
      - "Registry YAMLs updated for new artifacts"
      - "Update BOARD.yaml stage=IMPLEMENT files_created=[...]"

  TEST:
    order: 6
    coverage_target: "90%"
    required_test_types:
      - "Unit tests (Vitest)"
      - "Integration tests"
      - "E2E tests (Playwright)"
    required_outputs:
      - "All tests written and passing"
      - "Coverage report generated"
      - "Test cases registered in ai-os/registry/ARTIFACTS.yaml tests[]"
      - "Update BOARD.yaml stage=TEST test_results={}"
    halt_if:
      - "Any test fails"
      - "Coverage below 90%"

  REVIEW:
    order: 7
    ai_review_checklist:
      code_quality:
        - "No TypeScript any type"
        - "No console.log in production code"
        - "No code duplication"
        - "All functions have clear TypeScript types"
      security:
        - "No secrets in code"
        - "Input validation at all boundaries"
        - "Auth checks on all protected routes"
      architecture:
        - "No business logic in UI components"
        - "No direct DB access from presentation layer"
        - "Module boundaries respected"
      documentation:
        - "CHANGELOG.md updated"
        - "Registry YAMLs updated"
        - "ADR created if significant architectural decision made"
      testing:
        - "All acceptance criteria have corresponding tests"
        - "All fraud scenarios have corresponding tests"
        - "All edge cases have corresponding tests"
    required_outputs:
      - "Self-review checklist completed"
      - "PR opened with review request"
      - "Update BOARD.yaml stage=REVIEW"

  DEPLOY:
    order: 8
    pre_deploy_checks:
      - "All CI checks passing"
      - "PR approved by human reviewer"
      - "Rollback strategy documented in spec"
      - "Migration safety verified if DB changes"
    environments:
      - { name: preview, trigger: "PR opened", approval_required: false }
      - { name: staging, trigger: "PR merged to develop", approval_required: false }
      - { name: production, trigger: "Manual promotion", approval_required: true }
    required_outputs:
      - "Deployment URL logged in BOARD.yaml"
      - "Update BOARD.yaml stage=DEPLOY deployed_at=now"

  MONITOR:
    order: 9
    duration: "24 hours minimum"
    check_sources:
      - "Sentry: error rate vs baseline"
      - "PostHog: key metrics vs baseline"
      - "Vercel: build and runtime logs"
    rollback_triggers:
      - "Error rate increases more than 10%"
      - "Key metric drops more than 20%"
      - "Critical user journey broken"
    required_outputs:
      - "Monitoring summary logged in BOARD.yaml"

  LEARN:
    order: 10
    required_outputs:
      - "Lessons learned added to ai-os/boss/COMPLETED.yaml"
      - "Registry updated with discovered relationships"
      - "docs/governance/HEALTH.md updated"
      - "ADR created if architectural insight gained"

  IMPROVE:
    order: 11
    required_outputs:
      - "Improvement suggestions filed as new tasks in BOARD.yaml status=proposed"
      - "Performance improvements filed as new tasks"
      - "Security improvements filed as new tasks priority=high"
      - "Tech debt identified and filed"
      - "Update BOARD.yaml stage=IMPROVE task_status=COMPLETED"
