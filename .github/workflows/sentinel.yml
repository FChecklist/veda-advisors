name: Sentinel Governance Checks

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

jobs:
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  docs-check:
    name: Documentation Sentinel Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SENTINEL.md exists
        run: |
          if [ ! -f SENTINEL.md ]; then
            echo "::error::SENTINEL.md missing. Governance constitution required."
            exit 1
          fi
          echo "SENTINEL.md present"
      - name: Check governance docs
        run: |
          for f in "docs/governance/CHANGELOG.md" "docs/governance/HEALTH.md" "docs/decisions/README.md"; do
            if [ ! -f "$f" ]; then
              echo "::warning::Governance file missing: $f"
            else
              echo "OK: $f"
            fi
          done

  security-pattern-check:
    name: Security Pattern Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for hardcoded credential patterns
        run: |
          echo "Scanning for hardcoded credential patterns..."
          if grep -rn --include="*.ts" --include="*.tsx" --include="*.js" \
            -E "(password|secret|apikey)\s*=\s*[a-zA-Z0-9+/]{20,}" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=.git \
            . 2>/dev/null | grep -v "placeholder\|example\|CHANGE_ME" | head -5; then
            echo "::warning::Potential hardcoded credentials detected above."
          else
            echo "No hardcoded credential patterns detected."
          fi

  adr-notice:
    name: ADR Reminder
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Remind about ADRs for architecture changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          for f in $CHANGED; do
            case "$f" in
              next.config.*|turbo.json|package.json|*.prisma|supabase/migrations/*)
                ADR_COUNT=$(find docs/decisions -name "ADR-*.md" 2>/dev/null | wc -l)
                echo "::notice::Architecture file changed ($f). ADR count: $ADR_COUNT. Add an ADR in docs/decisions/ for significant decisions."
                ;;
            esac
          done
