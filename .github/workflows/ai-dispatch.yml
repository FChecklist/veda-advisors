name: AI Engine Dispatch

on:
  repository_dispatch:
    types:
      - ai-task
      - claude-task
      - zai-task
      - codex-task
      - sentinel-task
  workflow_dispatch:
    inputs:
      engine:
        description: "AI engine to use (claude|zai|codex)"
        required: true
        default: "claude"
      task:
        description: "Task description for the AI agent"
        required: true
      branch:
        description: "Branch to work on"
        required: false
        default: "main"

jobs:
  dispatch-log:
    name: Log AI Dispatch Event
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log dispatch event to BOARD.yaml
        run: |
          echo "AI Dispatch received at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Event type: ${{ github.event_name }}"
          echo "Client payload: ${{ toJSON(github.event.client_payload) }}"
          echo "Dispatch type: ${{ github.event.action }}"

      - name: Record in sentinel health
        run: |
          echo "dispatch_received: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> ai-os/sentinel/HEALTH.yaml || true
          echo "Engine dispatch logged successfully"

  claude-agent:
    name: Claude Code Agent
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.engine == 'claude' ||
      github.event.action == 'claude-task' ||
      github.event.action == 'ai-task'
    steps:
      - uses: actions/checkout@v4
      - name: Claude Agent Placeholder
        run: |
          echo "Claude Code agent triggered"
          echo "Task: ${{ github.event.inputs.task || github.event.client_payload.task }}"
          echo "ANTHROPIC_API_KEY is set: ${{ secrets.ANTHROPIC_API_KEY != '' }}"
          echo "Ready for Claude Code integration when ANTHROPIC_API_KEY is configured"

  zai-agent:
    name: Z.ai Agent
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.engine == 'zai' ||
      github.event.action == 'zai-task'
    steps:
      - uses: actions/checkout@v4
      - name: Z.ai Agent Placeholder
        run: |
          echo "Z.ai agent triggered"
          echo "Task: ${{ github.event.inputs.task || github.event.client_payload.task }}"
          echo "ZAI_API_KEY is set: ${{ secrets.ZAI_API_KEY != '' }}"
          echo "Ready for Z.ai integration when ZAI_API_KEY is configured"

  codex-agent:
    name: OpenAI Codex Agent
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.engine == 'codex' ||
      github.event.action == 'codex-task'
    steps:
      - uses: actions/checkout@v4
      - name: Codex Agent Placeholder
        run: |
          echo "OpenAI Codex agent triggered"
          echo "Task: ${{ github.event.inputs.task || github.event.client_payload.task }}"
          echo "OPENAI_API_KEY is set: ${{ secrets.OPENAI_API_KEY != '' }}"
          echo "Ready for Codex integration when OPENAI_API_KEY is configured"
